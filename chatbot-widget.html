<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actress Website with AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --accent-color: #d4697d;
            --accent-gradient: linear-gradient(135deg, #d4697d 0%, #f09cb0 100%);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --card-shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.12);
            --glass-blur: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdf6f5 0%, #fcfbfb 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        .page-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding: 80px 20px;
        }

        .page-content h1 {
            font-size: 3em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .page-content p {
            font-size: 1.2em;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Chatbot Floating Bubble Button */
        .chatbot-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent-gradient);
            border: 2px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 10px 25px rgba(212, 105, 125, 0.35);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
            z-index: 999;
            animation: floatingGlow 2.5s ease-in-out infinite;
        }

        .chatbot-bubble:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 105, 125, 0.5);
        }

        .chatbot-bubble span {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .chatbot-bubble:hover span {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes floatingGlow {
            0%, 100% {
                transform: translateY(0);
                box-shadow: 0 10px 25px rgba(212, 105, 125, 0.35);
            }
            50% {
                transform: translateY(-6px);
                box-shadow: 0 15px 35px rgba(212, 105, 125, 0.65);
            }
        }

        /* Chat Popup Window (Glassmorphism) */
        .chatbot-popup {
            position: fixed;
            bottom: 105px;
            right: 30px;
            width: 380px;
            height: 520px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            display: flex;
            flex-direction: column;
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .chatbot-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            box-shadow: var(--card-shadow-hover);
        }

        /* Chat Header */
        .chatbot-header {
            background: var(--accent-gradient);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .chatbot-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            color: white;
        }

        .header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Messages Area */
        .chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: rgba(0, 0, 0, 0.02);
        }

        /* Base Message Styling */
        .message {
            display: flex;
            animation: messageSlideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .message-bubble {
            background: var(--accent-gradient);
            color: white;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 15px rgba(212, 105, 125, 0.15);
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bot-message .message-bubble {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 16px;
        }

        /* Typing animation */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 18px 18px 18px 4px;
            width: fit-content;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.4;
            animation: typingPulse 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingPulse {
            0%, 60%, 100% {
                opacity: 0.4;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-6px);
            }
        }

        /* Input Area styling */
        .chatbot-input-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            background: var(--bg-primary);
        }

        .chatbot-input {
            flex: 1;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 25px;
            padding: 11px 18px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.25s ease;
        }

        .chatbot-input:focus {
            outline: none;
            border-color: #d4697d;
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px rgba(212, 105, 125, 0.15);
        }

        .chatbot-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 10px rgba(212, 105, 125, 0.2);
        }

        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 15px rgba(212, 105, 125, 0.35);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Webkit Scrollbars for Message Area */
        .chatbot-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chatbot-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chatbot-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .chatbot-messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .chatbot-popup {
                width: calc(100% - 30px);
                height: 60vh;
                bottom: 90px;
                right: 15px;
                left: 15px;
                border-radius: 20px;
            }

            .chatbot-bubble {
                bottom: 20px;
                right: 20px;
                width: 54px;
                height: 54px;
            }
        }
    </style>
</head>
<body>
    <div class="page-content">
        <h1>✨ AI Assistant Demo Dashboard</h1>
        <p>Try our upgraded AI Assistant in the bottom right corner! 💬</p>
        <p>Ask anything about the actress or general questions. This mockup renders the premium design and maintains conversation context!</p>
    </div>

    <!-- Chatbot Widget -->
    <div class="chatbot-bubble" id="chatbotBubble">
        <span>💬</span>
    </div>

    <div class="chatbot-popup" id="chatbotPopup">
        <div class="chatbot-header">
            <h2>
                <div class="header-avatar">🤖</div>
                Assistant
            </h2>
            <button class="close-btn" id="closeBtn">✕</button>
        </div>

        <div class="chatbot-messages" id="chatbotMessages">
            <!-- Messages will be added here -->
        </div>

        <div class="chatbot-input-area">
            <input 
                type="text" 
                class="chatbot-input" 
                id="chatbotInput" 
                placeholder="Type your message..."
            >
            <button class="send-btn" id="sendBtn">📤</button>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const GEMINI_API_KEY = 'AIzaSyAmYhaUT2e1zMvfXoY3KyFLpvnMctLFR0Q';
        const GIST_URL = 'https://gist.githubusercontent.com/JannatulBinteSneha/567651735484338d8f74ee7c92661c43/raw';
        const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';

        // ===== STATE MANAGEMENT =====
        let actressData = '';
        let isWaitingForResponse = false;
        let conversationHistory = []; // Stores the session history: { role: 'user' | 'model', text: string }

        // ===== DOM ELEMENTS =====
        const chatbotBubble = document.getElementById('chatbotBubble');
        const chatbotPopup = document.getElementById('chatbotPopup');
        const closeBtn = document.getElementById('closeBtn');
        const chatbotMessages = document.getElementById('chatbotMessages');
        const chatbotInput = document.getElementById('chatbotInput');
        const sendBtn = document.getElementById('sendBtn');

        // ===== EVENT LISTENERS =====
        chatbotBubble.addEventListener('click', toggleChat);
        closeBtn.addEventListener('click', closeChat);
        sendBtn.addEventListener('click', sendMessage);
        chatbotInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isWaitingForResponse) {
                sendMessage();
            }
        });

        // ===== FUNCTIONS =====
        function toggleChat() {
            chatbotPopup.classList.toggle('active');
            if (chatbotPopup.classList.contains('active')) {
                chatbotInput.focus();
            }
        }

        function closeChat() {
            chatbotPopup.classList.remove('active');
        }

        async function sendMessage() {
            const userMessage = chatbotInput.value.trim();
            
            if (!userMessage) return;
            if (isWaitingForResponse) return;

            // Add user message to UI
            addMessage(userMessage, 'user');
            chatbotInput.value = '';

            // Update conversation history
            conversationHistory.push({ role: 'user', text: userMessage });
            if (conversationHistory.length > 10) {
                conversationHistory = conversationHistory.slice(-10);
            }

            // Show typing indicator
            isWaitingForResponse = true;
            addTypingIndicator();

            try {
                const response = await queryGeminiAPI(userMessage);
                removeTypingIndicator();
                addMessage(response, 'bot');

                // Update conversation history
                conversationHistory.push({ role: 'model', text: response });
                if (conversationHistory.length > 10) {
                    conversationHistory = conversationHistory.slice(-10);
                }
            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                
                // Remove failed user prompt from context
                if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length - 1].text === userMessage) {
                    conversationHistory.pop();
                }
                
                addMessage('Sorry, I had trouble processing that. Please try again.', 'bot');
            } finally {
                isWaitingForResponse = false;
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            chatbotMessages.appendChild(messageDiv);

            // Auto scroll to bottom
            setTimeout(() => {
                chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
            }, 0);
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot-message';
            messageDiv.id = 'typing-indicator';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(indicator);
            chatbotMessages.appendChild(messageDiv);

            // Auto scroll to bottom
            setTimeout(() => {
                chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
            }, 0);
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        async function queryGeminiAPI(userMessage) {
            const systemPrompt = `You are a helpful assistant on Prianka Zaman's personal portfolio website.

Your task is to answer user questions:
- Provide information about Prianka Zaman using the provided actressData.
- Answer general questions helpfully and politely.

Information about Prianka Zaman:
${actressData || 'No actress data loaded currently.'}

Rules:
1. Be polite, engaging, and professional.
2. For questions about Prianka Zaman, rely ONLY on the information provided in the "Information about Prianka Zaman" section above. If the answer is not in the data, politely say that you don't have that information but can help with general questions.
3. For general questions (outside of Prianka Zaman), answer them naturally and accurately.
4. Keep all responses concise (maximum 3 sentences).
5. Use relevant emojis occasionally to make the chat friendly.`;

            // Map history to Gemini API format
            const contents = conversationHistory.map(item => ({
                role: item.role === 'model' ? 'model' : 'user',
                parts: [{ text: item.text }]
            }));

            // Make sure the last item in contents is our latest message
            const lastItem = contents[contents.length - 1];
            if (!lastItem || lastItem.parts[0].text !== userMessage || lastItem.role !== 'user') {
                contents.push({
                    role: 'user',
                    parts: [{ text: userMessage }]
                });
            }

            const requestBody = {
                systemInstruction: {
                    parts: [
                        {
                            text: systemPrompt
                        }
                    ]
                },
                contents: contents,
                generationConfig: {
                    temperature: 0.7,
                    topK: 40,
                    topP: 0.95,
                    maxOutputTokens: 350,
                }
            };

            try {
                const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    return 'I could not generate a response. Please try again.';
                }
            } catch (error) {
                console.error('Gemini API Error:', error);
                throw error;
            }
        }

        async function fetchActressData() {
            try {
                const response = await fetch(GIST_URL);
                if (!response.ok) {
                    throw new Error(`Failed to fetch data: ${response.status}`);
                }
                actressData = await response.text();
                console.log('Actress data loaded successfully');
            } catch (error) {
                console.error('Error fetching actress data:', error);
                actressData = ''; // Fallback to empty, API handles gracefully
            }
        }

        function initializeChat() {
            // Add initial greeting message
            setTimeout(() => {
                addMessage('Hi! How can I help you today? 😊', 'bot');
            }, 500);
        }

        // ===== INITIALIZATION =====
        fetchActressData();

        // Initialize chat when popup is opened for the first time
        chatbotBubble.addEventListener('click', function initOnFirstClick() {
            if (chatbotMessages.children.length === 0) {
                initializeChat();
            }
            chatbotBubble.removeEventListener('click', initOnFirstClick);
            chatbotBubble.addEventListener('click', toggleChat);
        });
    </script>
</body>
</html>
