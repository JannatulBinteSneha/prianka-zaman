    <!-- Social Media Card Wrapper -->
    <div class="social-media-container" data-aos="fade-up">
        <div class="social-well">
            <h2>Profiles</h2>
            <hr>
            <div class="profile-grid" data-aos="fade-up" data-aos-delay="200">
                <!-- Facebook Card -->
                <a href="https://www.facebook.com/zamanprianka" target="_blank" class="profile-card facebook-card" data-aos="fade-up" data-aos-delay="50">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook Page</span>
                </a>
                
                <!-- Instagram Card -->
                <a href="https://www.instagram.com/prianka.zaman" target="_blank" class="profile-card instagram-card" data-aos="fade-up" data-aos-delay="100">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                
                <!-- IMDb Card -->
                <a href="https://www.imdb.com/name/nm16434694/" target="_blank" class="profile-card imdb-card" data-aos="fade-up" data-aos-delay="150">

                    <span>IMDb</span>
                </a>
                
                <!-- YouTube Card -->
                <a href="https://www.youtube.com/@priyankazaman1348" target="_blank" class="profile-card youtube-card" data-aos="fade-up" data-aos-delay="200">

    <!-- Chatbot Widget -->
    <div class="chatbot-bubble" id="chatbotBubble">
        <span>💬</span>
    </div>

    <div class="chatbot-popup" id="chatbotPopup">
        <div class="chatbot-header">
            <h2>
                <div class="header-avatar">🤖</div>
                Assistant
            </h2>
            <button class="close-btn" id="closeBtn">✕</button>
        </div>

        <div class="chatbot-messages" id="chatbotMessages">
            <!-- Messages will be added here -->
        </div>

        <div class="chatbot-input-area">
            <input 
                type="text" 
                class="chatbot-input" 
                id="chatbotInput" 
                placeholder="Type your message..."
            >
            <button class="send-btn" id="sendBtn">📤</button>
        </div>
    </div>

    <script src="../chatbot.js"></script>
